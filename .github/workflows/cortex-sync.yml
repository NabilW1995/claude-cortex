name: Cortex Learnings Sync

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 06:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Export team learnings
        run: npm run team:export

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet .claude/team-learnings.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Cortex Bot"
          git config user.email "cortex@noreply.github.com"
          git add .claude/team-learnings.json
          git commit -m "chore: sync team learnings [automated]"
          git push
